<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0,
                   maximum-scale=1.0,
                   user-scalable=no">

    <title>POS - Abarrote Cloud</title>

    <style>
        :root {
            --fondo: #0f172a;
            --panel: #111827;
            --panel-secundario: #1e293b;
            --borde: #334155;
            --texto: #f8fafc;
            --muted: #94a3b8;
            --verde: #22c55e;
            --verde-oscuro: #15803d;
            --azul: #2563eb;
            --rojo: #ef4444;
            --amarillo: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--fondo);
            color: var(--texto);
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .pos {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 390px;
            min-height: 100vh;
        }

        .catalogo {
            min-width: 0;
            padding: 18px;
        }

        .ticket-panel {
            background: var(--panel);
            border-left: 1px solid var(--borde);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 18px;
        }

        .encabezado {
            align-items: center;
            display: flex;
            gap: 14px;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .titulo {
            color: #4ade80;
            font-size: 24px;
        }

        .datos-sesion {
            color: var(--muted);
            font-size: 13px;
            text-align: right;
        }

        .busqueda {
            display: grid;
            gap: 10px;
            grid-template-columns: minmax(0, 1fr) auto auto;
            margin-bottom: 14px;
        }

        .busqueda input {
            background: var(--panel);
            border: 2px solid var(--borde);
            border-radius: 9px;
            color: var(--texto);
            font-size: 18px;
            min-width: 0;
            outline: none;
            padding: 14px;
        }

        .busqueda input:focus {
            border-color: var(--verde);
        }

        .btn {
            border: none;
            border-radius: 9px;
            color: white;
            font-weight: 700;
            padding: 12px 18px;
        }

        .btn-buscar {
            background: var(--azul);
        }

        .btn-todos {
            background: var(--panel-secundario);
            border: 1px solid var(--borde);
        }

        .btn-cobrar {
            background: var(--verde);
            color: #052e16;
            font-size: 20px;
            margin-top: 14px;
            padding: 16px;
            width: 100%;
        }

        .btn-cobrar:disabled {
            cursor: not-allowed;
            opacity: .45;
        }

        .btn-cancelar {
            background: var(--rojo);
            margin-top: 10px;
            width: 100%;
        }

        .estado {
            border-radius: 8px;
            display: none;
            margin-bottom: 14px;
            padding: 12px;
        }

        .estado.visible {
            display: block;
        }

        .estado.info {
            background: rgba(37, 99, 235, .18);
            border: 1px solid #2563eb;
        }

        .estado.error {
            background: rgba(239, 68, 68, .18);
            border: 1px solid #ef4444;
        }

        .estado.ok {
            background: rgba(34, 197, 94, .18);
            border: 1px solid #22c55e;
        }

        .categorias {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .categoria {
            background: var(--panel-secundario);
            border: 1px solid var(--borde);
            border-radius: 999px;
            color: var(--texto);
            padding: 8px 13px;
        }

        .categoria.activa {
            background: var(--verde);
            border-color: var(--verde);
            color: #052e16;
            font-weight: 700;
        }

        .productos {
            display: grid;
            gap: 12px;
            grid-template-columns:
                repeat(auto-fill, minmax(190px, 1fr));
            max-height: calc(100vh - 190px);
            overflow-y: auto;
            padding-bottom: 30px;
        }

        .producto {
            background: var(--panel);
            border: 1px solid var(--borde);
            border-radius: 12px;
            color: var(--texto);
            min-height: 145px;
            padding: 15px;
            text-align: left;
            transition: transform .12s ease,
                        border-color .12s ease;
        }

        .producto:hover {
            border-color: var(--verde);
            transform: translateY(-2px);
        }

        .producto:disabled {
            cursor: not-allowed;
            opacity: .45;
        }

        .producto-nombre {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.25;
            min-height: 42px;
        }

        .producto-codigo {
            color: var(--muted);
            font-size: 12px;
            margin-top: 8px;
            overflow-wrap: anywhere;
        }

        .producto-precio {
            color: #4ade80;
            font-size: 23px;
            font-weight: 800;
            margin-top: 10px;
        }

        .producto-stock {
            color: var(--muted);
            font-size: 13px;
            margin-top: 6px;
        }

        .ticket-titulo {
            border-bottom: 1px solid var(--borde);
            font-size: 22px;
            padding-bottom: 14px;
        }

        .ticket-items {
            flex: 1;
            margin-top: 10px;
            max-height: calc(100vh - 275px);
            overflow-y: auto;
        }

        .ticket-vacio {
            color: var(--muted);
            padding: 35px 10px;
            text-align: center;
        }

        .ticket-item {
            border-bottom: 1px solid var(--borde);
            padding: 12px 0;
        }

        .ticket-item-superior {
            align-items: flex-start;
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }

        .ticket-item-nombre {
            font-weight: 700;
            line-height: 1.25;
        }

        .ticket-item-precio {
            color: #4ade80;
            font-weight: 700;
            white-space: nowrap;
        }

        .ticket-controles {
            align-items: center;
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .ticket-controles button {
            background: var(--panel-secundario);
            border: 1px solid var(--borde);
            border-radius: 7px;
            color: white;
            height: 34px;
            width: 36px;
        }

        .ticket-controles .eliminar {
            background: rgba(239, 68, 68, .2);
            border-color: var(--rojo);
            margin-left: auto;
        }

        .cantidad {
            min-width: 30px;
            text-align: center;
        }

        .total {
            border-top: 1px solid var(--borde);
            display: flex;
            font-size: 28px;
            font-weight: 800;
            justify-content: space-between;
            padding-top: 16px;
        }

        .total-importe {
            color: #4ade80;
        }

        .modal {
            align-items: center;
            background: rgba(0, 0, 0, .72);
            display: none;
            inset: 0;
            justify-content: center;
            padding: 18px;
            position: fixed;
            z-index: 1000;
        }

        .modal.visible {
            display: flex;
        }

        .modal-contenido {
            background: var(--panel);
            border: 1px solid var(--borde);
            border-radius: 14px;
            max-width: 440px;
            padding: 24px;
            width: 100%;
        }

        .modal-contenido h2 {
            margin-bottom: 18px;
        }

        .modal-total {
            color: #4ade80;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 18px;
            text-align: center;
        }

        .campo-pago label {
            color: var(--muted);
            display: block;
            margin-bottom: 7px;
        }

        .campo-pago input {
            background: var(--fondo);
            border: 2px solid var(--borde);
            border-radius: 9px;
            color: white;
            font-size: 26px;
            padding: 13px;
            text-align: right;
            width: 100%;
        }

        .cambio {
            font-size: 21px;
            margin-top: 15px;
            text-align: right;
        }

        .modal-botones {
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr 1fr;
            margin-top: 20px;
        }

        .btn-confirmar {
            background: var(--verde);
            color: #052e16;
        }

        .btn-cerrar {
            background: var(--panel-secundario);
            border: 1px solid var(--borde);
        }

        @media (max-width: 900px) {
            body {
                overflow: auto;
            }

            .pos {
                display: block;
            }

            .catalogo {
                padding: 12px;
            }

            .ticket-panel {
                border-left: none;
                border-top: 1px solid var(--borde);
                min-height: auto;
                padding: 14px;
            }

            .productos {
                grid-template-columns:
                    repeat(2, minmax(0, 1fr));
                max-height: none;
            }

            .ticket-items {
                max-height: 370px;
            }
        }

        @media (max-width: 560px) {
            .encabezado {
                align-items: flex-start;
            }

            .titulo {
                font-size: 20px;
            }

            .busqueda {
                grid-template-columns: 1fr 1fr;
            }

            .busqueda input {
                grid-column: 1 / -1;
            }

            .productos {
                grid-template-columns:
                    repeat(2, minmax(0, 1fr));
            }

            .producto {
                min-height: 135px;
                padding: 11px;
            }

            .producto-precio {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<div class="pos">

    <main class="catalogo">

        <div class="encabezado">

            <h1 class="titulo">
                🛒 Abarrote Cloud POS
            </h1>

            <div class="datos-sesion">
                <div>
                    Cajero:
                    <strong th:text="${nombreCajero != null
                                      ? nombreCajero
                                      : cajero}">
                        Cajero
                    </strong>
                </div>

                <div>
                    Sucursal:
                    <strong th:text="${sucursal}">
                        Principal
                    </strong>
                </div>
            </div>

        </div>

        <div class="busqueda">

            <input id="searchInput"
                   type="search"
                   autocomplete="off"
                   autocapitalize="off"
                   spellcheck="false"
                   inputmode="search"
                   placeholder="Escanea código o escribe producto">

            <button id="btnBuscar"
                    class="btn btn-buscar"
                    type="button">
                Buscar
            </button>

            <button id="btnTodos"
                    class="btn btn-todos"
                    type="button">
                Todos
            </button>

        </div>

        <div id="estado"
             class="estado">
        </div>

        <div id="categorias"
             class="categorias">

            <button class="categoria activa"
                    type="button"
                    data-categoria="">
                Todos
            </button>

        </div>

        <section id="productos"
                 class="productos">

            <div class="ticket-vacio">
                Cargando productos…
            </div>

        </section>

    </main>

    <aside class="ticket-panel">

        <h2 class="ticket-titulo">
            Ticket de venta
        </h2>

        <div id="ticketItems"
             class="ticket-items">

            <div class="ticket-vacio">
                Agrega productos al ticket
            </div>

        </div>

        <div class="total">
            <span>Total</span>

            <span id="totalTicket"
                  class="total-importe">
                $0.00
            </span>
        </div>

        <button id="btnCobrar"
                class="btn btn-cobrar"
                type="button"
                disabled>
            Cobrar
        </button>

        <button id="btnCancelarVenta"
                class="btn btn-cancelar"
                type="button">
            Cancelar ticket
        </button>

    </aside>

</div>

<div id="modalCobro"
     class="modal">

    <div class="modal-contenido">

        <h2>Confirmar cobro</h2>

        <div id="modalTotal"
             class="modal-total">
            $0.00
        </div>

        <div class="campo-pago">

            <label for="inputPago">
                Efectivo recibido
            </label>

            <input id="inputPago"
                   type="number"
                   min="0"
                   step="0.01"
                   inputmode="decimal"
                   placeholder="0.00">

        </div>

        <div class="cambio">
            Cambio:
            <strong id="cambio">
                $0.00
            </strong>
        </div>

        <div class="modal-botones">

            <button id="btnCerrarCobro"
                    class="btn btn-cerrar"
                    type="button">
                Regresar
            </button>

            <button id="btnConfirmarVenta"
                    class="btn btn-confirmar"
                    type="button">
                Confirmar venta
            </button>

        </div>

    </div>

</div>

<script th:inline="javascript">
    'use strict';

    /*
     * ==========================================================
     * ESTADO ÚNICO DEL POS
     * ==========================================================
     *
     * No existen wrappers de fetch.
     * No existen listeners duplicados.
     * No existen parches de compatibilidad superpuestos.
     */

    const estadoPos = {
        productos: [],
        productosVisibles: [],
        carrito: [],
        categoriaActiva: '',
        procesandoBusqueda: false,
        procesandoVenta: false,
        ultimoCodigo: '',
        ultimoEscaneoEn: 0
    };

    const elementos = {
        searchInput:
            document.getElementById('searchInput'),

        btnBuscar:
            document.getElementById('btnBuscar'),

        btnTodos:
            document.getElementById('btnTodos'),

        productos:
            document.getElementById('productos'),

        categorias:
            document.getElementById('categorias'),

        estado:
            document.getElementById('estado'),

        ticketItems:
            document.getElementById('ticketItems'),

        totalTicket:
            document.getElementById('totalTicket'),

        btnCobrar:
            document.getElementById('btnCobrar'),

        btnCancelarVenta:
            document.getElementById('btnCancelarVenta'),

        modalCobro:
            document.getElementById('modalCobro'),

        modalTotal:
            document.getElementById('modalTotal'),

        inputPago:
            document.getElementById('inputPago'),

        cambio:
            document.getElementById('cambio'),

        btnCerrarCobro:
            document.getElementById('btnCerrarCobro'),

        btnConfirmarVenta:
            document.getElementById('btnConfirmarVenta')
    };

    function escaparHtml(valor) {
        return String(valor ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function numeroSeguro(valor) {

        if (
            typeof valor === 'number'
            && Number.isFinite(valor)
        ) {
            return valor;
        }

        if (
            valor === null
            || valor === undefined
            || valor === ''
        ) {
            return NaN;
        }

        let texto = String(valor)
            .trim()
            .replace(/\s/g, '')
            .replace(/[^\d,.-]/g, '');

        if (
            texto.includes(',')
            && texto.includes('.')
        ) {
            texto = texto.replace(/,/g, '');

        } else if (texto.includes(',')) {
            texto = texto.replace(',', '.');
        }

        const numero = Number(texto);

        return Number.isFinite(numero)
            ? numero
            : NaN;
    }

    function dinero(valor) {

        const numero = numeroSeguro(valor);

        return new Intl.NumberFormat(
            'es-MX',
            {
                style: 'currency',
                currency: 'MXN'
            }
        ).format(
            Number.isFinite(numero)
                ? numero
                : 0
        );
    }

    function obtenerPrecio(producto) {

        const candidatos = [
            producto?.precioVenta,
            producto?.precio_venta,
            producto?.precio,
            producto?.precioUnitario
        ];

        for (const candidato of candidatos) {

            const precio =
                numeroSeguro(candidato);

            if (
                Number.isFinite(precio)
                && precio > 0
            ) {
                return precio;
            }
        }

        return NaN;
    }

    function obtenerStock(producto) {

        const valor =
            producto?.stock
            ?? producto?.existencia
            ?? producto?.cantidadDisponible
            ?? 0;

        const stock =
            Number(valor);

        return Number.isFinite(stock)
            ? Math.max(0, Math.trunc(stock))
            : 0;
    }

    function obtenerCategoria(producto) {

        if (
            producto?.categoria
            && typeof producto.categoria === 'object'
        ) {
            return {
                id:
                    String(
                        producto.categoria.id
                        ?? producto.categoria.nombre
                        ?? ''
                    ),

                nombre:
                    String(
                        producto.categoria.nombre
                        ?? 'Sin categoría'
                    )
            };
        }

        const nombre =
            producto?.categoriaNombre
            ?? producto?.nombreCategoria
            ?? producto?.categoria
            ?? 'Sin categoría';

        const id =
            producto?.categoriaId
            ?? nombre;

        return {
            id: String(id ?? ''),
            nombre: String(nombre)
        };
    }

    function normalizarProducto(origen) {

        if (
            !origen
            || typeof origen !== 'object'
        ) {
            return null;
        }

        const precio =
            obtenerPrecio(origen);

        const id =
            Number(
                origen.id
                ?? origen.productoId
            );

        if (
            !Number.isFinite(id)
            || id <= 0
        ) {
            return null;
        }

        const categoria =
            obtenerCategoria(origen);

        return {
            id: id,

            nombre:
                String(
                    origen.nombre
                    ?? origen.productoNombre
                    ?? 'Producto sin nombre'
                ),

            codigoBarras:
                String(
                    origen.codigoBarras
                    ?? origen.codigo_barras
                    ?? ''
                ).trim(),

            precioVenta:
                Number.isFinite(precio)
                    ? precio
                    : 0,

            stock:
                obtenerStock(origen),

            categoriaId:
                categoria.id,

            categoriaNombre:
                categoria.nombre
        };
    }

    function extraerDataApi(json) {

        if (Array.isArray(json)) {
            return json;
        }

        if (
            json
            && Array.isArray(json.data)
        ) {
            return json.data;
        }

        return [];
    }

    function mostrarEstado(
        mensaje,
        tipo = 'info',
        duracion = 3500
    ) {

        elementos.estado.textContent =
            mensaje;

        elementos.estado.className =
            `estado visible ${tipo}`;

        window.clearTimeout(
            mostrarEstado.timeoutId
        );

        if (duracion > 0) {

            mostrarEstado.timeoutId =
                window.setTimeout(
                    function () {
                        elementos.estado.className =
                            'estado';
                    },
                    duracion
                );
        }
    }

    async function leerRespuesta(response) {

        const texto =
            await response.text();

        if (!texto) {
            return {};
        }

        try {
            return JSON.parse(texto);

        } catch (error) {
            throw new Error(
                'El servidor regresó una respuesta no válida.'
            );
        }
    }

    async function cargarTodosLosProductos(
        mostrarMensaje = true
    ) {

        if (mostrarMensaje) {
            mostrarEstado(
                'Cargando catálogo…',
                'info',
                0
            );
        }

        try {

            const response =
                await fetch(
                    '/api/ventas/productos',
                    {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        },
                        credentials: 'same-origin'
                    }
                );

            const json =
                await leerRespuesta(response);

            if (!response.ok) {

                throw new Error(
                    json?.message
                    ?? json?.mensaje
                    ?? `Error HTTP ${response.status}`
                );
            }

            const productos =
                extraerDataApi(json)
                    .map(normalizarProducto)
                    .filter(Boolean);

            estadoPos.productos =
                productos;

            estadoPos.productosVisibles =
                productos;

            estadoPos.categoriaActiva =
                '';

            renderizarCategorias();

            seleccionarCategoriaVisual('');

            renderizarProductos(
                productos
            );

            mostrarEstado(
                `${productos.length} productos disponibles`,
                'ok'
            );

            return productos;

        } catch (error) {

            console.error(
                '[POS] Error cargando productos:',
                error
            );

            estadoPos.productos = [];
            estadoPos.productosVisibles = [];

            renderizarProductos([]);

            mostrarEstado(
                `No fue posible cargar el catálogo: ${error.message}`,
                'error',
                0
            );

            return [];
        }
    }

    function renderizarCategorias() {

        const mapa =
            new Map();

        for (
            const producto
            of estadoPos.productos
        ) {

            const id =
                producto.categoriaId
                || producto.categoriaNombre;

            const nombre =
                producto.categoriaNombre
                || 'Sin categoría';

            if (!mapa.has(id)) {
                mapa.set(id, nombre);
            }
        }

        let html = `
            <button
                class="categoria activa"
                type="button"
                data-categoria="">
                Todos
            </button>
        `;

        for (
            const [id, nombre]
            of mapa.entries()
        ) {

            html += `
                <button
                    class="categoria"
                    type="button"
                    data-categoria="${escaparHtml(id)}">
                    ${escaparHtml(nombre)}
                </button>
            `;
        }

        elementos.categorias.innerHTML =
            html;
    }

    function seleccionarCategoriaVisual(
        categoriaId
    ) {

        elementos.categorias
            .querySelectorAll('.categoria')
            .forEach(
                function (boton) {

                    boton.classList.toggle(
                        'activa',
                        boton.dataset.categoria
                            === String(categoriaId ?? '')
                    );
                }
            );
    }

    function filtrarCategoria(
        categoriaId
    ) {

        estadoPos.categoriaActiva =
            String(categoriaId ?? '');

        seleccionarCategoriaVisual(
            estadoPos.categoriaActiva
        );

        elementos.searchInput.value = '';

        if (!estadoPos.categoriaActiva) {

            estadoPos.productosVisibles =
                [...estadoPos.productos];

        } else {

            estadoPos.productosVisibles =
                estadoPos.productos.filter(
                    producto =>
                        String(producto.categoriaId)
                        === estadoPos.categoriaActiva
                );
        }

        renderizarProductos(
            estadoPos.productosVisibles
        );

        enfocarBuscador();
    }

    function renderizarProductos(
        productos
    ) {

        if (
            !Array.isArray(productos)
            || productos.length === 0
        ) {

            elementos.productos.innerHTML = `
                <div class="ticket-vacio">
                    No se encontraron productos
                </div>
            `;

            return;
        }

        elementos.productos.innerHTML =
            productos.map(
                function (producto) {

                    const precioValido =
                        Number.isFinite(
                            producto.precioVenta
                        )
                        && producto.precioVenta > 0;

                    const disponible =
                        producto.stock > 0
                        && precioValido;

                    const leyenda =
                        !precioValido
                            ? 'Sin precio válido'
                            : producto.stock <= 0
                                ? 'Sin existencia'
                                : `Existencia: ${producto.stock}`;

                    return `
                        <button
                            class="producto"
                            type="button"
                            data-producto-id="${producto.id}"
                            ${disponible ? '' : 'disabled'}>

                            <div class="producto-nombre">
                                ${escaparHtml(producto.nombre)}
                            </div>

                            <div class="producto-codigo">
                                ${escaparHtml(
                                    producto.codigoBarras
                                    || 'Sin código'
                                )}
                            </div>

                            <div class="producto-precio">
                                ${precioValido
                                    ? dinero(producto.precioVenta)
                                    : '$0.00'}
                            </div>

                            <div class="producto-stock">
                                ${escaparHtml(leyenda)}
                            </div>

                        </button>
                    `;
                }
            ).join('');
    }

    function normalizarTexto(valor) {

        return String(valor ?? '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase()
            .trim();
    }

    function pareceCodigoBarras(
        consulta
    ) {

        return /^[0-9]{6,50}$/.test(
            String(consulta).trim()
        );
    }

    async function buscarProductos() {

        if (estadoPos.procesandoBusqueda) {
            return;
        }

        const consulta =
            elementos.searchInput.value
                .trim();

        if (!consulta) {

            await mostrarTodos();

            return;
        }

        estadoPos.procesandoBusqueda =
            true;

        try {

            /*
             * Primero se busca en el catálogo ya cargado.
             * Así el scanner no produce dos peticiones ni dos altas.
             */

            const consultaNormalizada =
                normalizarTexto(consulta);

            const porCodigo =
                estadoPos.productos.find(
                    producto =>
                        producto.codigoBarras
                        === consulta
                );

            if (porCodigo) {

                agregarProducto(
                    porCodigo,
                    true
                );

                limpiarBuscador();

                return;
            }

            const coincidenciasLocales =
                estadoPos.productos.filter(
                    function (producto) {

                        return normalizarTexto(
                            producto.nombre
                        ).includes(
                            consultaNormalizada
                        )
                        || String(
                            producto.codigoBarras
                        ).includes(consulta);
                    }
                );

            /*
             * Un código numérico introducido por scanner debe agregar
             * exactamente un producto o mostrar que no existe.
             */
            if (pareceCodigoBarras(consulta)) {

                if (
                    coincidenciasLocales.length === 1
                ) {

                    agregarProducto(
                        coincidenciasLocales[0],
                        true
                    );

                } else {

                    mostrarEstado(
                        `No existe un producto con código ${consulta}`,
                        'error'
                    );
                }

                limpiarBuscador();

                return;
            }

            /*
             * Para búsqueda por nombre se muestran resultados,
             * sin agregar automáticamente.
             */
            if (
                coincidenciasLocales.length > 0
            ) {

                estadoPos.productosVisibles =
                    coincidenciasLocales;

                renderizarProductos(
                    coincidenciasLocales
                );

                mostrarEstado(
                    `${coincidenciasLocales.length} coincidencia(s)`,
                    'ok'
                );

                seleccionarCategoriaVisual(
                    '__ninguna__'
                );

                return;
            }

            /*
             * Solo como respaldo se consulta el endpoint de búsqueda.
             */
            const response =
                await fetch(
                    '/api/ventas/buscar?q='
                    + encodeURIComponent(consulta),
                    {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        },
                        credentials: 'same-origin'
                    }
                );

            const json =
                await leerRespuesta(response);

            if (!response.ok) {

                throw new Error(
                    json?.message
                    ?? json?.mensaje
                    ?? `Error HTTP ${response.status}`
                );
            }

            const productos =
                extraerDataApi(json)
                    .map(normalizarProducto)
                    .filter(Boolean);

            estadoPos.productosVisibles =
                productos;

            renderizarProductos(
                productos
            );

            seleccionarCategoriaVisual(
                '__ninguna__'
            );

            if (productos.length === 0) {

                mostrarEstado(
                    `No se encontraron productos para "${consulta}"`,
                    'error'
                );

            } else {

                mostrarEstado(
                    `${productos.length} coincidencia(s)`,
                    'ok'
                );
            }

        } catch (error) {

            console.error(
                '[POS] Error buscando productos:',
                error
            );

            mostrarEstado(
                `Error de búsqueda: ${error.message}`,
                'error'
            );

        } finally {

            estadoPos.procesandoBusqueda =
                false;

            enfocarBuscador();
        }
    }

    async function mostrarTodos() {

        elementos.searchInput.value = '';

        estadoPos.categoriaActiva = '';

        if (
            !Array.isArray(estadoPos.productos)
            || estadoPos.productos.length === 0
        ) {

            await cargarTodosLosProductos();

            return;
        }

        estadoPos.productosVisibles =
            [...estadoPos.productos];

        seleccionarCategoriaVisual('');

        renderizarProductos(
            estadoPos.productosVisibles
        );

        mostrarEstado(
            `${estadoPos.productos.length} productos disponibles`,
            'ok'
        );

        enfocarBuscador();
    }

    function agregarProducto(
        producto,
        vieneDeEscaner = false
    ) {

        const normalizado =
            normalizarProducto(producto);

        if (!normalizado) {

            mostrarEstado(
                'El producto recibido no es válido.',
                'error'
            );

            return false;
        }

        if (
            !Number.isFinite(
                normalizado.precioVenta
            )
            || normalizado.precioVenta <= 0
        ) {

            mostrarEstado(
                `${normalizado.nombre} no tiene precio de venta válido.`,
                'error'
            );

            return false;
        }

        if (normalizado.stock <= 0) {

            mostrarEstado(
                `${normalizado.nombre} no tiene existencia.`,
                'error'
            );

            return false;
        }

        const existente =
            estadoPos.carrito.find(
                item =>
                    item.id === normalizado.id
            );

        if (existente) {

            if (
                existente.cantidad + 1
                > normalizado.stock
            ) {

                mostrarEstado(
                    `No hay más existencia disponible de ${normalizado.nombre}.`,
                    'error'
                );

                return false;
            }

            existente.cantidad += 1;

        } else {

            /*
             * Solo aquí se agrega una línea nueva al ticket.
             * No se agrega nada antes de validar ID, precio y stock.
             */
            estadoPos.carrito.push({
                id: normalizado.id,
                nombre: normalizado.nombre,
                codigoBarras:
                    normalizado.codigoBarras,
                precioVenta:
                    normalizado.precioVenta,
                cantidad: 1,
                stock:
                    normalizado.stock
            });
        }

        renderizarTicket();

        mostrarEstado(
            `${normalizado.nombre} agregado al ticket`,
            'ok',
            vieneDeEscaner ? 1800 : 2500
        );

        return true;
    }

    function modificarCantidad(
        productoId,
        cambio
    ) {

        const item =
            estadoPos.carrito.find(
                producto =>
                    producto.id === productoId
            );

        if (!item) {
            return;
        }

        const nuevaCantidad =
            item.cantidad + cambio;

        if (nuevaCantidad <= 0) {

            eliminarDelTicket(
                productoId
            );

            return;
        }

        if (
            nuevaCantidad > item.stock
        ) {

            mostrarEstado(
                `Existencia máxima disponible: ${item.stock}`,
                'error'
            );

            return;
        }

        item.cantidad =
            nuevaCantidad;

        renderizarTicket();
    }

    function eliminarDelTicket(
        productoId
    ) {

        estadoPos.carrito =
            estadoPos.carrito.filter(
                producto =>
                    producto.id !== productoId
            );

        renderizarTicket();
    }

    function calcularTotal() {

        return estadoPos.carrito.reduce(
            function (
                total,
                item
            ) {

                const precio =
                    numeroSeguro(
                        item.precioVenta
                    );

                const cantidad =
                    Number(item.cantidad);

                if (
                    !Number.isFinite(precio)
                    || precio <= 0
                    || !Number.isInteger(cantidad)
                    || cantidad <= 0
                ) {
                    return total;
                }

                return total
                    + precio * cantidad;
            },
            0
        );
    }

    function validarCarrito() {

        if (estadoPos.carrito.length === 0) {

            return {
                valido: false,
                mensaje:
                    'El ticket está vacío.'
            };
        }

        for (
            const item
            of estadoPos.carrito
        ) {

            if (
                !Number.isFinite(
                    numeroSeguro(
                        item.precioVenta
                    )
                )
                || numeroSeguro(
                    item.precioVenta
                ) <= 0
            ) {

                return {
                    valido: false,
                    mensaje:
                        `${item.nombre} tiene precio inválido.`
                };
            }

            if (
                !Number.isInteger(
                    item.cantidad
                )
                || item.cantidad <= 0
            ) {

                return {
                    valido: false,
                    mensaje:
                        `${item.nombre} tiene cantidad inválida.`
                };
            }
        }

        const total =
            calcularTotal();

        if (
            !Number.isFinite(total)
            || total <= 0
        ) {

            return {
                valido: false,
                mensaje:
                    'El total de la venta debe ser mayor que cero.'
            };
        }

        return {
            valido: true,
            total: Number(total.toFixed(2))
        };
    }

    function renderizarTicket() {

        if (estadoPos.carrito.length === 0) {

            elementos.ticketItems.innerHTML = `
                <div class="ticket-vacio">
                    Agrega productos al ticket
                </div>
            `;

        } else {

            elementos.ticketItems.innerHTML =
                estadoPos.carrito.map(
                    function (item) {

                        const subtotal =
                            item.precioVenta
                            * item.cantidad;

                        return `
                            <div class="ticket-item">

                                <div class="ticket-item-superior">

                                    <div class="ticket-item-nombre">
                                        ${escaparHtml(item.nombre)}
                                    </div>

                                    <div class="ticket-item-precio">
                                        ${dinero(subtotal)}
                                    </div>

                                </div>

                                <div class="ticket-controles">

                                    <button
                                        type="button"
                                        data-accion="restar"
                                        data-producto-id="${item.id}">
                                        −
                                    </button>

                                    <span class="cantidad">
                                        ${item.cantidad}
                                    </span>

                                    <button
                                        type="button"
                                        data-accion="sumar"
                                        data-producto-id="${item.id}">
                                        +
                                    </button>

                                    <span>
                                        ${dinero(item.precioVenta)}
                                        c/u
                                    </span>

                                    <button
                                        class="eliminar"
                                        type="button"
                                        data-accion="eliminar"
                                        data-producto-id="${item.id}">
                                        ✕
                                    </button>

                                </div>

                            </div>
                        `;
                    }
                ).join('');
        }

        const total =
            calcularTotal();

        elementos.totalTicket.textContent =
            dinero(total);

        elementos.btnCobrar.disabled =
            !validarCarrito().valido;
    }

    function abrirCobro() {

        const validacion =
            validarCarrito();

        if (!validacion.valido) {

            mostrarEstado(
                validacion.mensaje,
                'error'
            );

            return;
        }

        elementos.modalTotal.textContent =
            dinero(validacion.total);

        elementos.inputPago.value =
            validacion.total.toFixed(2);

        actualizarCambio();

        elementos.modalCobro.classList.add(
            'visible'
        );

        window.setTimeout(
            function () {

                elementos.inputPago.focus();
                elementos.inputPago.select();

            },
            100
        );
    }

    function cerrarCobro() {

        elementos.modalCobro.classList.remove(
            'visible'
        );

        elementos.inputPago.value = '';

        elementos.cambio.textContent =
            '$0.00';

        enfocarBuscador();
    }

    function actualizarCambio() {

        const total =
            calcularTotal();

        const recibido =
            numeroSeguro(
                elementos.inputPago.value
            );

        const cambio =
            Number.isFinite(recibido)
                ? Math.max(
                    0,
                    recibido - total
                )
                : 0;

        elementos.cambio.textContent =
            dinero(cambio);
    }

    async function confirmarVenta() {

        if (estadoPos.procesandoVenta) {
            return;
        }

        const validacion =
            validarCarrito();

        if (!validacion.valido) {

            mostrarEstado(
                validacion.mensaje,
                'error'
            );

            cerrarCobro();

            return;
        }

        const pago =
            numeroSeguro(
                elementos.inputPago.value
            );

        if (
            !Number.isFinite(pago)
            || pago < validacion.total
        ) {

            mostrarEstado(
                'El efectivo recibido es insuficiente.',
                'error'
            );

            elementos.inputPago.focus();

            return;
        }

        /*
         * El backend calcula precio y total desde la base de datos.
         * El frontend únicamente envía productoId y cantidad.
         */
        const payload = {
            items:
                estadoPos.carrito.map(
                    item => ({
                        productoId:
                            item.id,

                        cantidad:
                            item.cantidad
                    })
                )
        };

        estadoPos.procesandoVenta =
            true;

        elementos.btnConfirmarVenta.disabled =
            true;

        elementos.btnConfirmarVenta.textContent =
            'Procesando…';

        try {

            const response =
                await fetch(
                    '/api/ventas/registrar',
                    {
                        method: 'POST',

                        headers: {
                            'Accept':
                                'application/json',

                            'Content-Type':
                                'application/json'
                        },

                        credentials:
                            'same-origin',

                        body:
                            JSON.stringify(payload)
                    }
                );

            const json =
                await leerRespuesta(response);

            if (!response.ok) {

                throw new Error(
                    json?.message
                    ?? json?.mensaje
                    ?? json?.error
                    ?? `Error HTTP ${response.status}`
                );
            }

            const venta =
                json?.data
                ?? json;

            const folio =
                venta?.id
                ? ` Folio: ${venta.id}.`
                : '';

            estadoPos.carrito = [];

            renderizarTicket();

            cerrarCobro();

            mostrarEstado(
                `Venta registrada correctamente.${folio}`,
                'ok',
                6000
            );

            /*
             * Recarga catálogo para reflejar existencias nuevas.
             */
            await cargarTodosLosProductos(
                false
            );

        } catch (error) {

            console.error(
                '[POS] Error registrando venta:',
                error
            );

            mostrarEstado(
                `No fue posible registrar la venta: ${error.message}`,
                'error',
                0
            );

        } finally {

            estadoPos.procesandoVenta =
                false;

            elementos.btnConfirmarVenta.disabled =
                false;

            elementos.btnConfirmarVenta.textContent =
                'Confirmar venta';
        }
    }

    function cancelarTicket() {

        if (estadoPos.carrito.length === 0) {

            enfocarBuscador();

            return;
        }

        const confirmar =
            window.confirm(
                '¿Deseas cancelar todo el ticket?'
            );

        if (!confirmar) {
            return;
        }

        estadoPos.carrito = [];

        renderizarTicket();

        mostrarEstado(
            'Ticket cancelado.',
            'info'
        );

        enfocarBuscador();
    }

    function limpiarBuscador() {

        elementos.searchInput.value = '';

        enfocarBuscador();
    }

    function enfocarBuscador() {

        window.setTimeout(
            function () {

                if (
                    !elementos.modalCobro
                        .classList
                        .contains('visible')
                ) {
                    elementos.searchInput.focus();
                }

            },
            50
        );
    }

    /*
     * ==========================================================
     * EVENTOS ÚNICOS
     * ==========================================================
     */

    elementos.btnBuscar.addEventListener(
        'click',
        buscarProductos
    );

    elementos.btnTodos.addEventListener(
        'click',
        mostrarTodos
    );

    elementos.searchInput.addEventListener(
        'keydown',
        function (evento) {

            if (evento.key !== 'Enter') {
                return;
            }

            evento.preventDefault();
            evento.stopPropagation();

            /*
             * Protección contra Enter duplicado del scanner.
             */
            const valor =
                elementos.searchInput.value.trim();

            const ahora =
                Date.now();

            if (
                valor
                && valor === estadoPos.ultimoCodigo
                && ahora - estadoPos.ultimoEscaneoEn < 700
            ) {

                elementos.searchInput.value = '';

                return;
            }

            estadoPos.ultimoCodigo =
                valor;

            estadoPos.ultimoEscaneoEn =
                ahora;

            buscarProductos();
        }
    );

    elementos.categorias.addEventListener(
        'click',
        function (evento) {

            const boton =
                evento.target.closest(
                    '[data-categoria]'
                );

            if (!boton) {
                return;
            }

            filtrarCategoria(
                boton.dataset.categoria
            );
        }
    );

    elementos.productos.addEventListener(
        'click',
        function (evento) {

            const boton =
                evento.target.closest(
                    '[data-producto-id]'
                );

            if (!boton) {
                return;
            }

            const productoId =
                Number(
                    boton.dataset.productoId
                );

            const producto =
                estadoPos.productosVisibles.find(
                    item =>
                        item.id === productoId
                )
                ?? estadoPos.productos.find(
                    item =>
                        item.id === productoId
                );

            if (!producto) {

                mostrarEstado(
                    'El producto seleccionado ya no está disponible.',
                    'error'
                );

                return;
            }

            agregarProducto(producto);

            enfocarBuscador();
        }
    );

    elementos.ticketItems.addEventListener(
        'click',
        function (evento) {

            const boton =
                evento.target.closest(
                    '[data-accion]'
                );

            if (!boton) {
                return;
            }

            const productoId =
                Number(
                    boton.dataset.productoId
                );

            switch (boton.dataset.accion) {

                case 'sumar':
                    modificarCantidad(
                        productoId,
                        1
                    );
                    break;

                case 'restar':
                    modificarCantidad(
                        productoId,
                        -1
                    );
                    break;

                case 'eliminar':
                    eliminarDelTicket(
                        productoId
                    );
                    break;
            }

            enfocarBuscador();
        }
    );

    elementos.btnCobrar.addEventListener(
        'click',
        abrirCobro
    );

    elementos.btnCancelarVenta.addEventListener(
        'click',
        cancelarTicket
    );

    elementos.inputPago.addEventListener(
        'input',
        actualizarCambio
    );

    elementos.inputPago.addEventListener(
        'keydown',
        function (evento) {

            if (evento.key === 'Enter') {

                evento.preventDefault();

                confirmarVenta();
            }
        }
    );

    elementos.btnCerrarCobro.addEventListener(
        'click',
        cerrarCobro
    );

    elementos.btnConfirmarVenta.addEventListener(
        'click',
        confirmarVenta
    );

    elementos.modalCobro.addEventListener(
        'click',
        function (evento) {

            if (
                evento.target
                === elementos.modalCobro
            ) {
                cerrarCobro();
            }
        }
    );

    document.addEventListener(
        'keydown',
        function (evento) {

            if (
                evento.key === 'Escape'
                && elementos.modalCobro
                    .classList
                    .contains('visible')
            ) {
                cerrarCobro();
            }
        }
    );

    window.addEventListener(
        'pageshow',
        function (evento) {

            /*
             * Evita recuperar un ticket visual obsoleto desde bfcache.
             */
            if (evento.persisted) {
                cargarTodosLosProductos();
            }

            enfocarBuscador();
        }
    );

    /*
     * Inicio.
     */
    document.addEventListener(
        'DOMContentLoaded',
        async function () {

            renderizarTicket();

            await cargarTodosLosProductos();

            enfocarBuscador();

            console.info(
                '[POS] POS limpio iniciado correctamente.'
            );
        }
    );
</script>

</body>
</html>
