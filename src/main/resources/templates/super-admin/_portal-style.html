<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<style th:fragment="styles">
    * {
        box-sizing: border-box;
    }

    :root {
        --bg: #07111f;
        --sidebar: #091728;
        --panel: #0d1d2d;
        --panel-2: #10263b;
        --border: #284258;
        --text: #f8fafc;
        --muted: #94a3b8;
        --green: #22c55e;
        --cyan: #38bdf8;
        --red: #ef4444;
        --yellow: #facc15;
    }

    body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, sans-serif;
    }

    .portal-layout {
        display: grid;
        grid-template-columns: 270px 1fr;
        min-height: 100vh;
    }

    .portal-sidebar {
        padding: 28px 22px;
        background: var(--sidebar);
        border-right: 1px solid var(--border);
    }

    .portal-brand h2 {
        margin: 0;
    }

    .portal-brand span {
        display: block;
        margin-top: 7px;
        color: var(--cyan);
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 1px;
    }

    .portal-menu {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 38px;
    }

    .portal-menu a {
        padding: 13px 15px;
        border-radius: 12px;
        color: var(--muted);
        text-decoration: none;
    }

    .portal-menu a:hover,
    .portal-menu a.active {
        color: white;
        background: var(--panel-2);
    }

    .portal-content {
        padding: 34px;
        overflow-x: auto;
    }

    .page-title {
        margin: 0;
        font-size: 31px;
    }

    .page-subtitle {
        margin: 7px 0 25px;
        color: var(--muted);
    }

    .cards {
        display: grid;
        grid-template-columns:
            repeat(auto-fit, minmax(190px, 1fr));
        gap: 18px;
        margin-bottom: 25px;
    }

    .metric,
    .panel {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
    }

    .metric {
        padding: 20px;
    }

    .metric small {
        color: var(--muted);
        font-weight: 800;
    }

    .metric strong {
        display: block;
        margin-top: 10px;
        font-size: 30px;
    }

    .panel {
        padding: 22px;
        margin-bottom: 22px;
    }

    .table-wrap {
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        padding: 14px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        white-space: nowrap;
    }

    th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
    }

    .badge {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--panel-2);
        font-size: 12px;
        font-weight: 900;
    }

    .badge-green {
        color: #bbf7d0;
        background: rgba(34, 197, 94, .17);
    }

    .badge-yellow {
        color: #fef08a;
        background: rgba(250, 204, 21, .14);
    }

    .plan-grid {
        display: grid;
        grid-template-columns:
            repeat(auto-fit, minmax(270px, 1fr));
        gap: 20px;
    }

    .plan-card {
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 17px;
        background: var(--panel);
    }

    .plan-price {
        margin: 18px 0;
        color: var(--green);
        font-size: 28px;
        font-weight: 900;
    }

    .feature-list {
        padding: 0;
        color: var(--muted);
        list-style: none;
        line-height: 1.9;
    }

    @media (max-width: 850px) {
        .portal-layout {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
</html>
