<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Abarrote Cloud'">Abarrote Cloud</title>
    <style th:fragment="styles">
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e2e8f0; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px; background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            color: white; display: flex; flex-direction: column; position: fixed;
            height: 100vh; overflow-y: auto;
        }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); text-align: center; }
        .sidebar-header .logo { font-size: 2.5rem; margin-bottom: 0.3rem; }
        .sidebar-header h2 { font-size: 1.1rem; font-weight: 600; color: #4ade80; }
        .sidebar-header .role { font-size: 0.75rem; opacity: 0.6; margin-top: 0.2rem; }
        .nav-menu { flex: 1; padding: 1rem 0; }
        .nav-item {
            display: block; padding: 0.9rem 1.5rem; color: rgba(255,255,255,0.75);
            text-decoration: none; transition: all 0.2s; border-left: 3px solid transparent;
        }
        .nav-item:hover, .nav-item.active { background: rgba(74, 222, 128, 0.1); color: #4ade80; border-left-color: #4ade80; }
        .nav-item i { margin-right: 0.7rem; font-style: normal; }
        .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.08); }
        .sidebar-footer a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
        .sidebar-footer a:hover { color: #ef4444; }
        .main-content { margin-left: 260px; flex: 1; padding: 2rem; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.8rem; color: #4ade80; }
        .btn {
            padding: 0.7rem 1.5rem; border: none; border-radius: 8px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-primary { background: linear-gradient(135deg, #4ade80, #22c55e); color: #1a1a2e; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .card { background: #16213e; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2); margin-bottom: 1.5rem; border: 1px solid #333; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #333; }
        .card-title { font-size: 1.2rem; font-weight: 600; color: #e2e8f0; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: #16213e; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 1rem; border: 1px solid #333; }
        .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .stat-icon.green { background: rgba(74, 222, 128, 0.15); } .stat-icon.blue { background: rgba(59, 130, 246, 0.15); }
        .stat-icon.orange { background: rgba(245, 158, 11, 0.15); } .stat-icon.red { background: rgba(239, 68, 68, 0.15); }
        .stat-info h3 { font-size: 1.6rem; font-weight: 700; color: #e2e8f0; }
        .stat-info p { color: #94a3b8; font-size: 0.85rem; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.9rem 1rem; text-align: left; border-bottom: 1px solid #333; color: #e2e8f0; }
        th { background: #0f3460; font-weight: 600; color: #4ade80; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover { background: rgba(74, 222, 128, 0.05); }
        .badge { padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .badge-info { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #94a3b8; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 0.7rem 1rem; border: 2px solid #333; border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s; background: #1a1a2e; color: #e2e8f0; }
        .form-control:focus { outline: none; border-color: #4ade80; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .alert { padding: 1rem 1.2rem; border-radius: 8px; margin-bottom: 1rem; }
        .alert-success { background: rgba(74, 222, 128, 0.1); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
        .alert-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>
    <div th:fragment="admin-sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo">🏪</div>
            <h2>Abarrote Cloud</h2>
            <div class="role" sec:authentication="name"></div>
            <div class="role" style="text-transform: uppercase; font-size: 0.7rem;" sec:authentication="principal.authorities"></div>
        </div>
        <nav class="nav-menu">
            <a th:href="@{/admin}" class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active' : ''"><i>📊</i> Dashboard</a>
            <a th:href="@{/pos}" class="nav-item" target="_blank"><i>🖥️</i> Punto de Venta</a>
            <a th:href="@{/admin/productos}" class="nav-item" th:classappend="${activePage == 'productos'} ? 'active' : ''"><i>📦</i> Productos</a>
            <a th:href="@{/admin/categorias}" class="nav-item" th:classappend="${activePage == 'categorias'} ? 'active' : ''"><i>🏷️</i> Categorías</a>
            <a th:href="@{/admin/usuarios}" class="nav-item" th:classappend="${activePage == 'usuarios'} ? 'active' : ''"><i>👥</i> Usuarios</a>
            <a th:href="@{/admin/reportes}" class="nav-item" th:classappend="${activePage == 'reportes'} ? 'active' : ''"><i>📈</i> Reportes</a>
            <a th:href="@{/admin/corte}" class="nav-item" th:classappend="${activePage == 'corte'} ? 'active' : ''"><i>💰</i> Corte de Caja</a>
        </nav>
        <!-- Dentro del nav del sidebar, antes del enlace de Cerrar Sesión -->
	<li class="nav-item">
	    <a class="nav-link" href="#" onclick="abrirModalCambioPassword(); return false;">
        	<i class="fas fa-key"></i> Cambiar Contraseña
    	</a>
	</li>
        <div class="sidebar-footer">
            <a th:href="@{/logout}"><span>🚪</span> Cerrar Sesión</a>
        </div>
    </div>
<!-- Modal Cambio de Contraseña -->
<div class="modal fade" id="modalCambioPassword" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header border-secondary">
                <h5 class="modal-title"><i class="fas fa-key me-2"></i>Cambiar Contraseña</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formCambioPassword">
                    <div class="mb-3">
                        <label class="form-label">Contraseña Actual</label>
                        <div class="input-group">
                            <input type="password" class="form-control bg-dark text-light border-secondary" 
                                   id="passwordActual" required>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('passwordActual')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nueva Contraseña</label>
                        <div class="input-group">
                            <input type="password" class="form-control bg-dark text-light border-secondary" 
                                   id="passwordNueva" required minlength="4">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('passwordNueva')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirmar Nueva Contraseña</label>
                        <div class="input-group">
                            <input type="password" class="form-control bg-dark text-light border-secondary" 
                                   id="passwordConfirmar" required minlength="4">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('passwordConfirmar')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </form>
                <div id="mensajeCambioPassword" class="alert d-none"></div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="guardarCambioPassword()">
                    <i class="fas fa-save me-1"></i>Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function abrirModalCambioPassword() {
    document.getElementById('formCambioPassword').reset();
    document.getElementById('mensajeCambioPassword').className = 'alert d-none';
    new bootstrap.Modal(document.getElementById('modalCambioPassword')).show();
}

function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    input.type = input.type === 'password' ? 'text' : 'password';
}

async function guardarCambioPassword() {
    const actual = document.getElementById('passwordActual').value;
    const nueva = document.getElementById('passwordNueva').value;
    const confirmar = document.getElementById('passwordConfirmar').value;
    const mensaje = document.getElementById('mensajeCambioPassword');
    
    if (nueva !== confirmar) {
        mensaje.className = 'alert alert-danger';
        mensaje.textContent = 'Las contraseñas nuevas no coinciden';
        return;
    }
    
    try {
        const response = await fetch('/api/usuarios/cambiar-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ passwordActual: actual, passwordNueva: nueva })
        });
        const data = await response.json();
        
        mensaje.className = data.success ? 'alert alert-success' : 'alert alert-danger';
        mensaje.textContent = data.message;
        
        if (data.success) {
            setTimeout(() => bootstrap.Modal.getInstance(document.getElementById('modalCambioPassword')).hide(), 1500);
        }
    } catch (e) {
        mensaje.className = 'alert alert-danger';
        mensaje.textContent = 'Error de conexión';
    }
}
</script>
</body>
</html>
