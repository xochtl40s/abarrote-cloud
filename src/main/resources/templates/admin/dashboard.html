<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Dashboard')}">
    <style th:replace="~{layout :: styles}"></style>
</head>
<body>
    <div class="wrapper">
        <div th:replace="~{layout :: admin-sidebar}"></div>
        <div class="main-content">
            <div class="page-header">
                <h1>📊 Dashboard</h1>
                <span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}" style="color:#888;"></span>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon green">💰</div>
                    <div class="stat-info">
                        <h3 th:text="'₲ ' + ${#numbers.formatDecimal(totalVentasHoy, 1, 'COMMA', 2, 'POINT')}">₲ 0.00</h3>
                        <p>Ventas de Hoy</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue">📦</div>
                    <div class="stat-info">
                        <h3 th:text="${totalProductos}">0</h3>
                        <p>Productos Activos</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">⚠️</div>
                    <div class="stat-info">
                        <h3 th:text="${productosStockBajo}" style="color: #c2410c;">0</h3>
                        <p>Stock Bajo</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">👥</div>
                    <div class="stat-info">
                        <h3 th:text="${totalUsuarios}">0</h3>
                        <p>Usuarios Activos</p>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title">⚡ Accesos Rápidos</span></div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem;">
                    <a th:href="@{/pos}" target="_blank" class="btn btn-primary" style="justify-content: center;">🖥️ Abrir POS</a>
                    <a th:href="@{/admin/productos}" class="btn btn-primary" style="justify-content: center; background: #3b82f6;">📦 Productos</a>
                    <a th:href="@{/admin/reportes}" class="btn btn-primary" style="justify-content: center; background: #8b5cf6;">📈 Reportes</a>
                    <a th:href="@{/admin/corte}" class="btn btn-primary" style="justify-content: center; background: #f59e0b;">💰 Corte de Caja</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
