<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0">

    <meta
            name="theme-color"
            content="#16213e">

    <title>
        Login - Abarrote Cloud
    </title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            font-family:
                    "Segoe UI",
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
            background: linear-gradient(
                    135deg,
                    #1a1a2e 0%,
                    #16213e 50%,
                    #0f3460 100%
            );
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: clamp(1.4rem, 6vw, 3rem);
            border: 1px solid #333;
            border-radius: 20px;
            background: #16213e;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .login-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .login-header .logo {
            margin-bottom: 0.4rem;
            font-size: clamp(3rem, 12vw, 4rem);
        }

        .login-header h1 {
            color: #4ade80;
            font-size: clamp(1.5rem, 7vw, 1.8rem);
            font-weight: 700;
        }

        .login-header p {
            margin-top: 0.3rem;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .alert-success,
        .error-message {
            margin-bottom: 1rem;
            padding: 0.85rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
        }

        .alert-success {
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
            background: rgba(74, 222, 128, 0.1);
        }

        .error-message {
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.1);
        }

        .form-group {
            margin-bottom: 1.15rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .password-wrapper {
            position: relative;
        }

        .form-control {
            width: 100%;
            min-height: 48px;
            padding: 0.9rem 1rem;
            border: 2px solid #333;
            border-radius: 10px;
            background: #1a1a2e;
            color: white;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .password-wrapper .form-control {
            padding-right: 3.2rem;
        }

        .form-control:focus {
            outline: none;
            border-color: #4ade80;
        }

        .form-control::placeholder {
            color: #64748b;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            width: 38px;
            height: 38px;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 1.15rem;
            cursor: pointer;
        }

        .toggle-password:hover {
            color: #4ade80;
        }

        .btn-login {
            width: 100%;
            min-height: 50px;
            margin-top: 0.35rem;
            padding: 0.9rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(
                    135deg,
                    #4ade80,
                    #22c55e
            );
            color: #1a1a2e;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition:
                    transform 0.2s,
                    box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(74, 222, 128, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {

            body {
                align-items: flex-start;
                padding: 1rem;
            }

            .login-container {
                margin-top: 4vh;
                padding: 1.4rem;
                border-radius: 16px;
            }

            .login-header {
                margin-bottom: 1.5rem;
            }
        }

        @media (max-height: 620px) {

            body {
                align-items: flex-start;
            }

            .login-container {
                margin-top: 1rem;
                margin-bottom: 1rem;
            }

            .login-header .logo {
                font-size: 2.6rem;
            }

            .login-header {
                margin-bottom: 1.2rem;
            }
        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="login-header">

        <div class="logo">
            🏪
        </div>

        <h1>
            Abarrote Cloud
        </h1>

        <p>
            Sistema de Punto de Venta
        </p>

    </div>

    <div
            th:if="${param.logout}"
            class="alert-success">
        ✅ Has cerrado sesión correctamente
    </div>

    <div
            th:if="${param.error}"
            class="error-message">
        ❌ Usuario o contraseña incorrectos
    </div>

    <form
            th:action="@{/login}"
            method="post">

        <div class="form-group">

            <label for="usernameInput">
                👤 Usuario
            </label>

            <input
                    type="text"
                    name="username"
                    class="form-control"
                    id="usernameInput"
                    placeholder="Ingresa tu usuario"
                    autocomplete="username"
                    required
                    autofocus>

        </div>

        <div class="form-group">

            <label for="passwordInput">
                🔒 Contraseña
            </label>

            <div class="password-wrapper">

                <input
                        type="password"
                        name="password"
                        class="form-control"
                        id="passwordInput"
                        placeholder="Ingresa tu contraseña"
                        autocomplete="current-password"
                        required>

                <button
                        type="button"
                        class="toggle-password"
                        onclick="togglePassword()"
                        aria-label="Mostrar u ocultar contraseña">
                    👁️
                </button>

            </div>

        </div>

        <button
                type="submit"
                class="btn-login">
            Iniciar Sesión
        </button>

    </form>

</div>

<script>

    function togglePassword() {

        const input =
            document.getElementById(
                'passwordInput'
            );

        const boton =
            document.querySelector(
                '.toggle-password'
            );

        if (input.type === 'password') {

            input.type = 'text';
            boton.textContent = '🙈';

        } else {

            input.type = 'password';
            boton.textContent = '👁️';
        }
    }

</script>

</body>

</html>
