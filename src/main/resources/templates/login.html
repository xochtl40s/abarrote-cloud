<!DOCTYPE html>
<html
    lang="es"
    xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="theme-color"
        content="#101827">

    <title>Login | Commerce Cloud</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            font-family:
                "Segoe UI",
                system-ui,
                sans-serif;
            background:
                radial-gradient(
                    circle at top left,
                    rgba(37, 99, 235, 0.35),
                    transparent 35%
                ),
                radial-gradient(
                    circle at bottom right,
                    rgba(147, 51, 234, 0.25),
                    transparent 35%
                ),
                #080d18;
        }

        .login-container {
            width: 100%;
            max-width: 430px;
            padding: 2.5rem;
            border: 1px solid #273449;
            border-radius: 22px;
            background: rgba(15, 23, 42, 0.94);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
        }

        .login-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .logo {
            margin-bottom: 0.6rem;
            font-size: 3.5rem;
        }

        h1 {
            color: #60a5fa;
            font-size: 1.9rem;
        }

        .subtitle {
            margin-top: 0.35rem;
            color: #94a3b8;
        }

        .verticals {
            margin-top: 0.8rem;
            color: #cbd5e1;
            font-size: 0.78rem;
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.8rem;
            border-radius: 9px;
            text-align: center;
            font-size: 0.9rem;
        }

        .success {
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.35);
            background: rgba(34, 197, 94, 0.1);
        }

        .error {
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.35);
            background: rgba(239, 68, 68, 0.1);
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        label {
            display: block;
            margin-bottom: 0.45rem;
            color: #cbd5e1;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .password-wrapper {
            position: relative;
        }

        .form-control {
            width: 100%;
            min-height: 50px;
            padding: 0.9rem 1rem;
            border: 2px solid #334155;
            border-radius: 11px;
            outline: none;
            color: #f8fafc;
            background: #111827;
            font-size: 16px;
        }

        .form-control:focus {
            border-color: #60a5fa;
        }

        .password-wrapper .form-control {
            padding-right: 3rem;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 0.6rem;
            transform: translateY(-50%);
            border: none;
            color: #cbd5e1;
            background: transparent;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            min-height: 50px;
            margin-top: 0.3rem;
            border: none;
            border-radius: 11px;
            color: white;
            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #7c3aed
                );
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
        }

        .footer {
            margin-top: 1.4rem;
            color: #64748b;
            text-align: center;
            font-size: 0.75rem;
        }

        @media (max-width: 500px) {
            .login-container {
                padding: 1.5rem;
            }
        }
    </style>


    <!-- Commerce Cloud: evitar formulario de login obsoleto -->
    <meta name="commerce-session-control"
          content="enabled">

    <meta http-equiv="Cache-Control"
          content="no-store, no-cache, must-revalidate">

    <meta http-equiv="Pragma"
          content="no-cache">

    <meta http-equiv="Expires"
          content="0">

</head>

<body>

<div class="login-container">

    <header class="login-header">

        <div class="logo">
            ☁️
        </div>

        <h1>
            Commerce Cloud
        </h1>

        <p class="subtitle">
            Una plataforma, múltiples negocios
        </p>

        <p class="verticals">
            🏪 Abarrotes · 🍽️ Restaurantes · 🏋️ Gimnasios
        </p>

    </header>

    <div
        th:if="${param.logout}"
        class="message success">
        ✅ Has cerrado sesión correctamente
    </div>

    <div
        th:if="${param.error}"
        class="message error">
        ❌ Usuario o contraseña incorrectos
    </div>

    <div
        th:if="${param.sesionRequerida}"
        class="message error">
        🔒 Debes iniciar sesión
    </div>

    <form
        th:action="@{/login}"
        method="post">

        <div class="form-group">

            <label for="usernameInput">
                👤 Usuario
            </label>

            <input
                id="usernameInput"
                class="form-control"
                type="text"
                name="username"
                placeholder="Ingresa tu usuario"
                autocomplete="username"
                required
                autofocus>

        </div>

        <div class="form-group">

            <label for="passwordInput">
                🔒 Contraseña
            </label>

            <div class="password-wrapper">

                <input
                    id="passwordInput"
                    class="form-control"
                    type="password"
                    name="password"
                    placeholder="Ingresa tu contraseña"
                    autocomplete="current-password"
                    required>

                <button
                    type="button"
                    class="toggle-password"
                    onclick="togglePassword()"
                    aria-label="Mostrar u ocultar contraseña">
                    👁️
                </button>

            </div>

        </div>

        <button
            type="submit"
            class="btn-login">
            Entrar a Commerce Cloud
        </button>

    </form>

    <div class="footer">
        El sistema abrirá automáticamente el módulo de tu empresa.
    </div>

</div>

<script>
    function togglePassword() {
        const input =
            document.getElementById(
                "passwordInput"
            );

        const button =
            document.querySelector(
                ".toggle-password"
            );

        if (input.type === "password") {
            input.type = "text";
            button.textContent = "🙈";
        } else {
            input.type = "password";
            button.textContent = "👁️";
        }
    }
</script>


<a
    href="/"
    style="
        margin-top: 18px;
        display: block;
        color: #69a7ff;
        text-align: center;
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: 700;
    "
>
    ← Conoce Abarrotes, Restaurantes y Gym Cloud
</a>


<script>
    /*
     * Firefox y otros navegadores pueden restaurar el formulario
     * de login desde Back/Forward Cache sin consultar al servidor.
     *
     * Si la página fue recuperada desde historial, hacemos una
     * navegación real hacia /login. El interceptor comprobará
     * entonces si la sesión sigue autenticada y redirigirá al
     * último módulo autorizado.
     */
    window.addEventListener("pageshow", function (event) {

        const navigationEntries =
            performance.getEntriesByType("navigation");

        const restoredFromHistory =
            event.persisted
            || (
                navigationEntries.length > 0
                && navigationEntries[0].type === "back_forward"
            );

        if (restoredFromHistory) {
            window.location.replace(
                window.location.pathname
                + "?sessionCheck="
                + Date.now()
            );
        }
    });
</script>

</body>
</html>
