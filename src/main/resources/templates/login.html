<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abarrotes Cloud - Acceso Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex h-screen w-screen items-center justify-center font-sans antialiased">

    <div class="w-full max-w-md p-8 space-y-6 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700">
        
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400 tracking-tight">
                Abarrotes Cloud
            </h1>
            <p class="mt-2 text-sm text-slate-400">Sistema Integral de Punto de Venta</p>
        </div>

        <div th:if="${param.error}" class="p-3 text-sm text-red-400 bg-red-950/50 border border-red-800 rounded-lg text-center">
            Usuario o contraseña incorrectos. Verifica tus credenciales.
        </div>
        
        <div th:if="${param.logout}" class="p-3 text-sm text-emerald-400 bg-emerald-950/50 border border-emerald-800 rounded-lg text-center">
            Sesión cerrada de forma segura.
        </div>

	<form th:action="@{/login}" method="POST" class="space-y-5">
            
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300">Usuario</label>
                <div class="mt-1">
                    <input id="username" name="username" type="text" required
                           class="w-full px-4 py-2.5 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition duration-200"
                           placeholder="Ingresa tu identificador">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300">Contraseña</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <input id="password" name="password" type="password" required
                           class="w-full px-4 py-2.5 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition duration-200 pr-12"
                           placeholder="••••••••">
                    
                    <button type="button" id="btnTogglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-cyan-400 transition duration-200">
                        <svg id="iconEyeOpen" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="iconEyeClosed" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.024 10.024 0 014.501-4.829m4.809-1.229A10.06 10.06 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21m-3.414-3.414L3 3m10 10a3 3 0 10-4-4m4 4a3 3 0 01-4-4" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" 
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-slate-900 bg-gradient-to-r from-cyan-400 to-emerald-400 hover:from-cyan-300 hover:to-emerald-300 focus:outline-none transition duration-200">
                    Iniciar Sesión
                </button>
            </div>
        </form>
	

        <div class="text-center pt-2">
            <span class="text-xs text-slate-500">Módulo de Autenticación Centralizado &copy; 2026</span>
        </div>
    </div>
	<script>
        	const passwordInput = document.getElementById('password');
	        const btnTogglePassword = document.getElementById('btnTogglePassword');
	        const iconEyeOpen = document.getElementById('iconEyeOpen');
	        const iconEyeClosed = document.getElementById('iconEyeClosed');

        	btnTogglePassword.addEventListener('click', () => {
            	// Cambiar el tipo de input
            	if (passwordInput.type === 'password') {
                	passwordInput.type = 'text';
             	   	iconEyeOpen.classList.add('hidden');
                	iconEyeClosed.classList.remove('hidden');
            	} else {
                	passwordInput.type = 'password';
                	iconEyeOpen.classList.remove('hidden');
                	iconEyeClosed.classList.add('hidden');
            	}
        	});
    </script>
</body>
</html>
