<!DOCTYPE html>
<html
    lang="es"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>POS | Gym Cloud</title>

    <style>
        body {
            margin: 0;
            padding: 2rem;
            font-family: sans-serif;
            color: white;
            background: #09090b;
        }

        a {
            color: #c084fc;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .productos,
        .carrito {
            padding: 1rem;
            border-radius: 14px;
            background: #18181b;
        }

        .producto {
            margin-bottom: 0.7rem;
            padding: 0.8rem;
            border: 1px solid #3f3f46;
            border-radius: 10px;
        }

        button,
        select {
            padding: 0.7rem;
            border-radius: 8px;
        }

        button {
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        li {
            margin-bottom: 0.6rem;
        }

        @media (max-width: 760px) {
            .grid {
                display: block;
            }

            .carrito {
                margin-top: 1rem;
            }
        }
    </style>
</head>

<body>

<a th:href="@{/gym/dashboard}">
    ← Regresar al dashboard
</a>

<h1>Punto de venta Gym Cloud</h1>

<div class="grid">

    <section class="productos">

        <h2>Productos</h2>

        <article
            class="producto"
            th:each="producto : ${productos}">

            <strong
                th:text="${producto.nombre}">
            </strong>

            <p>
                Precio:
                <span
                    th:text="${'$' + producto.precio}">
                </span>
            </p>

            <p>
                Existencia:
                <span
                    th:text="${producto.existencia}">
                </span>
            </p>

            <button
                type="button"
                th:attr="
                    data-id=${producto.id},
                    data-nombre=${producto.nombre},
                    data-precio=${producto.precio},
                    data-existencia=${producto.existencia}
                "
                onclick="agregarDesdeBoton(this)">
                Agregar
            </button>

        </article>

    </section>

    <aside class="carrito">

        <h2>Ticket</h2>

        <ul id="ticket"></ul>

        <h3>
            Total:
            $<span id="total">0.00</span>
        </h3>

        <select id="metodoPago">
            <option value="EFECTIVO">
                Efectivo
            </option>
            <option value="TARJETA">
                Tarjeta
            </option>
            <option value="TRANSFERENCIA">
                Transferencia
            </option>
        </select>

        <button
            type="button"
            onclick="cobrar()">
            Cobrar
        </button>

        <p id="mensaje"></p>

    </aside>

</div>

<script>
    const carrito = [];

    function agregarDesdeBoton(boton) {
        const producto = {
            id: Number(boton.dataset.id),
            nombre: boton.dataset.nombre,
            precio: Number(boton.dataset.precio),
            existencia: Number(
                boton.dataset.existencia
            )
        };

        const existente = carrito.find(
            item => item.productoId === producto.id
        );

        if (existente) {
            if (
                existente.cantidad
                    >= producto.existencia
            ) {
                alert('No hay más existencia disponible');
                return;
            }

            existente.cantidad++;
        } else {
            if (producto.existencia <= 0) {
                alert('Producto sin existencia');
                return;
            }

            carrito.push({
                productoId: producto.id,
                nombre: producto.nombre,
                precio: producto.precio,
                cantidad: 1,
                existencia: producto.existencia
            });
        }

        renderTicket();
    }

    function cambiarCantidad(index, cambio) {
        const item = carrito[index];

        const nuevaCantidad =
            item.cantidad + cambio;

        if (nuevaCantidad <= 0) {
            carrito.splice(index, 1);
        } else if (
            nuevaCantidad <= item.existencia
        ) {
            item.cantidad = nuevaCantidad;
        }

        renderTicket();
    }

    function renderTicket() {
        const lista =
            document.getElementById('ticket');

        lista.innerHTML = '';

        let total = 0;

        carrito.forEach((item, index) => {
            const subtotal =
                item.precio * item.cantidad;

            total += subtotal;

            const li =
                document.createElement('li');

            li.innerHTML = `
                ${item.nombre}
                x ${item.cantidad}
                = $${subtotal.toFixed(2)}
                <button onclick="cambiarCantidad(${index}, 1)">
                    +
                </button>
                <button onclick="cambiarCantidad(${index}, -1)">
                    -
                </button>
            `;

            lista.appendChild(li);
        });

        document.getElementById('total')
            .textContent = total.toFixed(2);
    }

    async function cobrar() {
        const mensaje =
            document.getElementById('mensaje');

        if (carrito.length === 0) {
            mensaje.textContent =
                'Agrega productos al ticket.';
            return;
        }

        mensaje.textContent =
            'Procesando venta...';

        const payload = {
            productos: carrito.map(item => ({
                productoId: item.productoId,
                cantidad: item.cantidad
            })),
            metodoPago:
                document.getElementById(
                    'metodoPago'
                ).value
        };

        try {
            const response = await fetch(
                '/gym/api/ventas',
                {
                    method: 'POST',
                    headers: {
                        'Content-Type':
                            'application/json'
                    },
                    body: JSON.stringify(payload)
                }
            );

            if (!response.ok) {
                const text = await response.text();

                throw new Error(
                    text || 'No fue posible registrar la venta'
                );
            }

            const venta = await response.json();

            mensaje.textContent =
                `Venta ${venta.ventaId} registrada. `
                + `Total: $${Number(venta.total).toFixed(2)}`;

            carrito.length = 0;

            renderTicket();

            setTimeout(
                () => window.location.reload(),
                1300
            );
        } catch (error) {
            mensaje.textContent =
                'Error: ' + error.message;
        }
    }
</script>

</body>
</html>
