<!DOCTYPE html>
<html
    lang="es"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Membresías | Gym Cloud</title>

    <style>
        body {
            margin: 0;
            padding: 2rem;
            font-family: sans-serif;
            color: white;
            background: #09090b;
        }

        a {
            color: #c084fc;
        }

        form,
        table {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            background: #18181b;
        }

        input,
        select {
            margin: 0.3rem;
            padding: 0.7rem;
            border: 1px solid #52525b;
            border-radius: 8px;
            color: white;
            background: #27272a;
        }

        button {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }

        th,
        td {
            padding: 0.7rem;
            border-bottom: 1px solid #3f3f46;
            text-align: left;
        }
    </style>
</head>

<body>

<a th:href="@{/gym/dashboard}">
    ← Regresar al dashboard
</a>

<h1>Membresías y pagos</h1>

<form
    method="post"
    th:action="@{/gym/membresias}">

    <h2>Asignar membresía</h2>

    <select
        name="clienteId"
        required>

        <option value="">
            Selecciona cliente
        </option>

        <option
            th:each="cliente : ${clientes}"
            th:value="${cliente.id}"
            th:text="${cliente.numeroCliente + ' - ' + cliente.nombre}">
        </option>

    </select>

    <select
        name="planId"
        required>

        <option value="">
            Selecciona plan
        </option>

        <option
            th:each="plan : ${planes}"
            th:value="${plan.id}"
            th:text="${plan.nombre + ' - $' + plan.precio}">
        </option>

    </select>

    <input
        name="fechaInicio"
        type="date">

    <button type="submit">
        Crear membresía
    </button>

</form>

<table>

    <thead>
    <tr>
        <th>Cliente</th>
        <th>Plan</th>
        <th>Inicio</th>
        <th>Fin</th>
        <th>Precio</th>
        <th>Estado</th>
        <th>Registrar pago</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="membresia : ${membresias}">

        <td
            th:text="${membresia.cliente.nombre}">
        </td>

        <td
            th:text="${membresia.plan.nombre}">
        </td>

        <td
            th:text="${membresia.fechaInicio}">
        </td>

        <td
            th:text="${membresia.fechaFin}">
        </td>

        <td
            th:text="${'$' + membresia.precioContratado}">
        </td>

        <td
            th:text="${membresia.estado}">
        </td>

        <td>

            <form
                method="post"
                th:action="@{/gym/membresias/pagar}">

                <input
                    type="hidden"
                    name="membresiaId"
                    th:value="${membresia.id}">

                <input
                    type="number"
                    step="0.01"
                    min="0.01"
                    name="importe"
                    th:value="${membresia.precioContratado}"
                    required>

                <select name="metodoPago">
                    <option value="EFECTIVO">
                        Efectivo
                    </option>
                    <option value="TARJETA">
                        Tarjeta
                    </option>
                    <option value="TRANSFERENCIA">
                        Transferencia
                    </option>
                </select>

                <input
                    name="referencia"
                    placeholder="Referencia">

                <button type="submit">
                    Registrar pago
                </button>

            </form>

        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
