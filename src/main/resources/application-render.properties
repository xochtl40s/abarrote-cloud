# ============================================================
# ABARROTE CLOUD - RENDER FREE
# ============================================================

spring.application.name=abarrote-cloud

# ============================================================
# SERVIDOR
# ============================================================

server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework

# ============================================================
# POSTGRESQL
# ============================================================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=600000

# ============================================================
# FLYWAY
# ============================================================

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=public
spring.flyway.table=flyway_schema_history

# Transición inicial de la base existente de Render.
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Esquema existente antes de Flyway

spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# ============================================================
# JPA / HIBERNATE
# ============================================================

# Flyway modifica; Hibernate solamente valida.
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Mexico_City
spring.jpa.properties.hibernate.generate_statistics=false

spring.data.jpa.repositories.bootstrap-mode=deferred

# ============================================================
# ARRANQUE CON MEMORIA REDUCIDA
# ============================================================

spring.main.lazy-initialization=true
spring.main.banner-mode=off
spring.jmx.enabled=false

# ============================================================
# THYMELEAF Y RECURSOS
# ============================================================

spring.thymeleaf.cache=true
spring.web.resources.cache.period=3600

# ============================================================
# SESIÓN
# ============================================================

server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# ============================================================
# TOMCAT
# ============================================================

server.tomcat.threads.max=30
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=100
server.tomcat.accept-count=20

# ============================================================
# ERRORES
# ============================================================

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ============================================================
# LOGS
# ============================================================

logging.level.root=INFO
logging.level.com.abarrote=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.flywaydb=INFO

# Importación masiva de productos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
