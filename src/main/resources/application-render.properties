# ============================================================
# ABARROTE CLOUD - RENDER FREE
# ============================================================

spring.application.name=abarrote-cloud

# Render entrega el puerto mediante PORT.
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework

# ============================================================
# POSTGRESQL
# ============================================================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool mínimo para 512 MB.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=600000

# ============================================================
# JPA / HIBERNATE
# ============================================================

# Temporal para pruebas.
# Más adelante lo cambiaremos por Flyway.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Mexico_City
spring.jpa.properties.hibernate.generate_statistics=false

# Reduce consumo durante el arranque.
spring.data.jpa.repositories.bootstrap-mode=deferred

# ============================================================
# ARRANQUE CON MEMORIA REDUCIDA
# ============================================================

spring.main.lazy-initialization=true

# Banner deshabilitado.
spring.main.banner-mode=off

# JMX consume memoria y no se necesita en la demo.
spring.jmx.enabled=false

# ============================================================
# THYMELEAF Y RECURSOS
# ============================================================

spring.thymeleaf.cache=true
spring.web.resources.cache.period=3600

# ============================================================
# SESIÓN
# ============================================================

server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# ============================================================
# SERVIDOR TOMCAT
# ============================================================

server.tomcat.threads.max=30
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=100
server.tomcat.accept-count=20

# ============================================================
# ERRORES
# ============================================================

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ============================================================
# LOGS
# ============================================================

logging.level.root=INFO
logging.level.com.abarrote=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
