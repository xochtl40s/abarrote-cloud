# ============================================================
# ABARROTE CLOUD - PERFIL RENDER
# ============================================================

spring.application.name=abarrote-cloud

# Render asigna dinámicamente el puerto mediante PORT.
server.port=${PORT:8080}
server.address=0.0.0.0

# Render termina HTTPS en su proxy.
server.forward-headers-strategy=framework

# ============================================================
# POSTGRESQL
# ============================================================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Conexiones reducidas para la instancia gratuita.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# ============================================================
# JPA / HIBERNATE
# ============================================================

# Solo durante la etapa de pruebas.
# Para producción sustituiremos esto por Flyway.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Mexico_City

# ============================================================
# THYMELEAF
# ============================================================

spring.thymeleaf.cache=true
spring.web.resources.cache.period=3600

# ============================================================
# SESIÓN
# ============================================================

server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# ============================================================
# MANEJO DE ERRORES
# ============================================================

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ============================================================
# LOGS
# ============================================================

logging.level.root=INFO
logging.level.com.abarrote=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
