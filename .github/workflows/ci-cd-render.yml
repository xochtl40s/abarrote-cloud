name: Abarrote Cloud CI-CD

on:
  push:
    branches:
      - feature/inventario-multisucursal
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: abarrote-cloud-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validar-aplicacion:

    name: Compilar y validar aplicación

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Mostrar versiones
        run: |
          java -version
          mvn -version
          docker --version

      - name: Compilar proyecto
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            clean compile

      - name: Generar JAR
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            -DskipTests \
            package

      - name: Verificar JAR generado
        run: |
          set -e

          JAR_FILE="$(find target -maxdepth 1 -type f \
            -name '*.jar' \
            ! -name '*.original' \
            | head -1)"

          if [ -z "${JAR_FILE}" ]; then
            echo "ERROR: Maven no generó el archivo JAR."
            exit 1
          fi

          echo "JAR generado:"
          ls -lh "${JAR_FILE}"

      - name: Construir imagen Docker
        run: |
          docker build \
            --tag abarrote-cloud:${{ github.sha }} \
            .

      - name: Verificar imagen Docker
        run: |
          docker image inspect \
            abarrote-cloud:${{ github.sha }} \
            > /dev/null

          echo "Imagen Docker validada correctamente."

  desplegar-render:

    name: Desplegar en Render

    runs-on: ubuntu-latest

    timeout-minutes: 10

    needs:
      - validar-aplicacion

    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/feature/inventario-multisucursal'

    environment:
      name: render-demo
      url: https://abarrote-cloud.onrender.com

    steps:

      - name: Validar secreto de Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "ERROR: falta el secreto RENDER_DEPLOY_HOOK_URL."
            exit 1
          fi

      - name: Solicitar despliegue en Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --location \
              --output render-response.json \
              --write-out "%{http_code}" \
              --request POST \
              "${RENDER_DEPLOY_HOOK_URL}"
          )"

          echo "Respuesta HTTP de Render: ${HTTP_STATUS}"

          cat render-response.json || true

          if [ "${HTTP_STATUS}" -lt 200 ] \
             || [ "${HTTP_STATUS}" -ge 300 ]; then

            echo "ERROR: Render rechazó el despliegue."
            exit 1
          fi

          echo "Despliegue solicitado correctamente."
